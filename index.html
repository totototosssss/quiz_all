let selectedCategories = [];
let currentQuiz = null;

window.onload = () => {
  const categories = [...new Set(quizData.map(q => q.category))];
  const menu = document.getElementById('category-list');
  categories.forEach(cat => {
    const label = document.createElement('label');
    label.className = 'category-label';
    label.innerHTML = `<input type="checkbox" value="${cat}" checked> ${cat}`;
    menu.appendChild(label);
  });
};

function startQuiz() {
  const checkboxes = document.querySelectorAll('#category-list input:checked');
  selectedCategories = Array.from(checkboxes).map(cb => cb.value);
  
  if (selectedCategories.length === 0) {
    alert('カテゴリーを1つ以上選択してください。');
    return;
  }

  quizData.forEach(d => {
    d.weight = 10;
  });

  document.getElementById('menu-screen').style.display = 'none';
  document.getElementById('quiz-screen').style.display = 'block';
  getNextQuiz();
}

function returnToMenu() {
  document.getElementById('menu-screen').style.display = 'block';
  document.getElementById('quiz-screen').style.display = 'none';
}

function getNextQuiz() {
  const activeData = quizData.filter(d => selectedCategories.includes(d.category) && d.weight > 0);
  
  if (activeData.length === 0) {
    document.getElementById("category").textContent = "";
    document.getElementById("question").textContent = "選択したカテゴリーの問題を全て覚えました！";
    document.getElementById("answer").textContent = "";
    document.getElementById("btn-show").style.display = "none";
    document.getElementById("eval-btns").style.display = "none";
    return;
  }

  let totalWeight = activeData.reduce((sum, d) => sum + d.weight, 0);
  let randomNum = Math.random() * totalWeight;
  
  for (let i = 0; i < activeData.length; i++) {
    randomNum -= activeData[i].weight;
    if (randomNum <= 0) {
      currentQuiz = activeData[i];
      break;
    }
  }

  document.getElementById("category").textContent = "【" + currentQuiz.category + "】";
  document.getElementById("question").textContent = currentQuiz.q;
  document.getElementById("answer").textContent = currentQuiz.a;
  
  document.getElementById("answer").style.display = "none";
  document.getElementById("btn-show").style.display = "block";
  document.getElementById("eval-btns").style.display = "none";
}

function showAnswer() {
  document.getElementById("answer").style.display = "block";
  document.getElementById("btn-show").style.display = "none";
  document.getElementById("eval-btns").style.display = "flex";
}

function evaluateQuiz(remembered) {
  if (remembered) {
    currentQuiz.weight = 0;
  } else {
    currentQuiz.weight += 15;
  }
  getNextQuiz();
}
